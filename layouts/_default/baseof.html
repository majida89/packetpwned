<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}PacketPwned — Majid Ahmed | Designing Secure & Resilient Networks{{ else }}{{ .Title }} | PacketPwned{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2X4LD5P3ZH"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2X4LD5P3ZH');</script>
</head>
<body>

  <nav class="nav">
    <a class="brand" href="/" aria-label="PacketPwned home"><span class="dot"></span>packet<b>pwned</b>.com</a>
    <div class="navlinks">
      {{ range .Site.Menus.main }}<a href="{{ .URL }}">/{{ lower .Name }}</a>{{ end }}
      <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener">linkedin ↗</a>
    </div>
    <button class="menu-btn" id="menu-btn" aria-label="Open menu">☰</button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <button class="close-btn" id="close-menu" aria-label="Close menu">✕</button>
    {{ range .Site.Menus.main }}<a href="{{ .URL }}">{{ .Name }}</a>{{ end }}
    <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
  </div>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <span class="status">© {{ now.Year }} Majid Ahmed · CCIE #55880 · CISSP</span>
    <span>Built with Hugo · GitHub Pages</span>
    <a href="#top">back to top ↑</a>
  </footer>

  <script>
    const mb=document.getElementById('menu-btn'),mm=document.getElementById('mobile-menu'),cm=document.getElementById('close-menu');
    mb.addEventListener('click',()=>mm.classList.add('open'));
    cm.addEventListener('click',()=>mm.classList.remove('open'));
    mm.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>mm.classList.remove('open')));
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  </script>
</body>
</html>
