{{ define "main" }}
<header class="article-head">
  <div class="wrap-narrow">
    {{ if and .Section (ne .Section "") }}
    <a class="back-link" href="/{{ .Section }}/">← back to /{{ .Section }}</a>
    {{ end }}
    <div class="sec-label">/{{ .Section }}</div>
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      {{ if not .Date.IsZero }}<span class="date">{{ .Date.Format "02 Jan 2006" }}</span>{{ end }}
      {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
  </div>
</header>
<div class="article-body">
  <div class="wrap-narrow">
    <article class="prose">
      {{ .Content }}
    </article>
  </div>
</div>
{{ end }}
